<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANDE0.0.SANKI.1 - AI Image Detector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="flag-strip">
                <div class="saffron"></div>
                <div class="white"></div>
                <div class="green"></div>
            </div>
            <h1>🇮🇳 VANDE0.0.SANKI.1</h1>
            <p class="subtitle">India's First Custom AI vs Real Image Detector</p>
            <div class="badge">Made in India ❤️</div>
        </header>

        <main>
            <div class="upload-section">
                <div class="upload-box" id="uploadBox">
                    <input type="file" id="imageInput" accept="image/*" hidden>
                    <div class="upload-content">
                        <div class="icon">📸</div>
                        <p>Click to Upload Image</p>
                        <span>or Drag & Drop</span>
                    </div>
                </div>
                
                <div class="preview" id="preview" style="display: none;">
                    <img id="previewImage" src="" alt="Preview">
                </div>
            </div>

            <button class="detect-btn" id="detectBtn" disabled>
                <span class="btn-icon">🔍</span>
                Detect with VANDE0.0.SANKI.1
            </button>

            <div class="result-section" id="resultSection" style="display: none;">
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>Analyzing image...</p>
                </div>
                
                <div class="result-card" id="resultCard" style="display: none;">
                    <div class="result-icon" id="resultIcon"></div>
                    <h2 id="resultText"></h2>
                    <div class="confidence-bar">
                        <div class="bar-fill" id="confidenceFill"></div>
                    </div>
                    <p class="confidence-text" id="confidenceText"></p>
                    <div class="details" id="details"></div>
                </div>
            </div>
        </main>

        <footer>
            <p>Powered by VANDE0.0.SANKI.1 - Made with 🇮🇳</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
