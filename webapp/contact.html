    <style>
        .contact-container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .contact-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 40px; text-align: center; }
        .contact-avatar { width: 80px; height: 80px; background: var(--gradient-1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 2rem; color: white; }
        .contact-links { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .contact-link { display: flex; align-items: center; gap: 12px; background: var(--card-hover); padding: 14px 20px; border-radius: var(--radius-sm); text-decoration: none; color: var(--text); transition: var(--transition); border: 1px solid var(--border); }
        .contact-link:hover { border-color: var(--saffron); transform: translateY(-2px); }
        .contact-link i { font-size: 1.3rem; width: 24px; }
        .contact-link.github i { color: #fff; }
        .contact-link.linkedin i { color: #0077b5; }
        .contact-link.email i { color: #ea4335; }
    </style>
